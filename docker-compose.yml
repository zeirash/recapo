version: '3.8'

services:
  # Golang Backend (Arion)
  backend:
    build:
      context: ./arion
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=recapo_user
      - DB_PASSWORD=Recapo123!
      - DB_NAME=recapo_master
      # TODO: Fill Cloudflare R2 credentials
      - R2_ACCOUNT_ID=
      - R2_ACCESS_KEY_ID=
      - R2_SECRET_ACCESS_KEY=
      - R2_BUCKET_NAME=
      - R2_PUBLIC_URL=
    depends_on:
      - postgres
    networks:
      - recapo-network

  # Next.js Frontend (Oncius)
  frontend:
    build:
      context: ./oncius
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:4000
    depends_on:
      - backend
    networks:
      - recapo-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=recapo_master
      - POSTGRES_USER=recapo_user
      - POSTGRES_PASSWORD=Recapo123!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - recapo-network

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - recapo-network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=recapo_grafana
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - recapo-network
    depends_on:
      - prometheus

  # Production-only: pushes metrics to Grafana Cloud (no self-hosted Grafana needed)
  prometheus-prod:
    image: prom/prometheus:v2.51.0
    profiles: ["prod"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        envsubst < /etc/prometheus/prometheus.template.yml > /etc/prometheus/prometheus.yml &&
        prometheus --config.file=/etc/prometheus/prometheus.yml
    environment:
      - GRAFANA_REMOTE_WRITE_URL=${GRAFANA_REMOTE_WRITE_URL}
      - GRAFANA_USER_ID=${GRAFANA_USER_ID}
      - GRAFANA_API_KEY=${GRAFANA_API_KEY}
    volumes:
      - ./monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.template.yml:ro
    networks:
      - recapo-network
    depends_on:
      - backend

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  recapo-network:
    driver: bridge
