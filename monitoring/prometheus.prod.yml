global:
  scrape_interval: 15s

remote_write:
  - url: GRAFANA_REMOTE_WRITE_URL_PLACEHOLDER
    basic_auth:
      username: GRAFANA_USER_ID_PLACEHOLDER
      password: GRAFANA_API_KEY_PLACEHOLDER

scrape_configs:
  - job_name: 'arion'
    scheme: https
    static_configs:
      - targets: ['ARION_URL_PLACEHOLDER']
    metrics_path: '/metrics'
